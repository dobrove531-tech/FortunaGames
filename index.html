<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Fortuna Game | Полная версия</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', 'Orbitron', monospace; }
    body { background: radial-gradient(circle at 20% 30%, #0a0a1a, #020210); min-height: 100vh; color: #e0e0ff; padding: 20px; }
    .glass { background: rgba(20,20,45,0.65); backdrop-filter: blur(12px); border-radius: 28px; border: 1px solid rgba(100,100,255,0.4); padding: 18px; margin-bottom: 20px; }
    .glass-card { background: rgba(20,20,45,0.65); backdrop-filter: blur(12px); border-radius: 28px; border: 1px solid rgba(100,100,255,0.4); padding: 18px; }
    .neon-text { text-shadow: 0 0 5px #4466ff; color: #88aaff; }
    button { background: linear-gradient(135deg,#1a1a3a,#0a0a2a); border:1px solid #6688ff; color:#bbddff; padding:8px 18px; border-radius:40px; cursor:pointer; margin:5px; }
    button:hover { background: linear-gradient(135deg,#2a2a5a,#1a1a4a); border-color:#ff88cc; }
    input,select { background:#111122; border:1px solid #4466cc; padding:8px 12px; border-radius:20px; color:white; margin:5px; }
    .grid-panel { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 24px; margin-bottom: 30px; }
    .chat-messages { height: 200px; overflow-y: auto; background: #000022aa; border-radius: 20px; padding: 10px; }
    .admin-only { border: 2px solid #ff88cc; background: #1a0a2a; }
    .limited { color:#ffaa88; background:#331100; padding:2px 8px; border-radius:10px; font-size:12px; }
    .wheel { width:200px; height:200px; border-radius:50%; background:conic-gradient(#ff4444 0deg 36deg,#ffaa44 36deg 72deg,#ffff44 72deg 108deg,#44ff44 108deg 144deg,#44ffff 144deg 180deg,#4444ff 180deg 216deg,#aa44ff 216deg 252deg,#ff44ff 252deg 288deg,#ff4444 288deg 324deg,#ffaa44 324deg 360deg); margin:10px auto; transition:transform 3s ease-out; cursor:pointer; }
    .click-button { font-size:24px; padding:20px 40px; background:linear-gradient(135deg,#ff6600,#ff3300); border-color:#ffaa00; color:white; }
    .tab { display: inline-block; padding: 10px 20px; cursor: pointer; background: #1a1a3a; border-radius: 20px; margin: 5px; }
    .tab.active { background: #4466ff; color: white; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
  </style>
</head>
<body>
<div id="app"></div>

<script>
  let currentUser = null;
  let socket = null;
  let cryptoRate = 100;
  let activeTab = "main";

  async function fetchJSON(url, options = {}) {
    let res = await fetch(url, { headers: { 'Content-Type': 'application/json' }, ...options });
    return res.json();
  }

  async function loadUserData() {
    if (!currentUser) return;
    let data = await fetchJSON(`/api/user/${currentUser.id}`);
    currentUser = data;
    return data;
  }

  async function doLogin() {
    let login = document.getElementById("loginName").value.trim();
    let pass = document.getElementById("loginPass").value.trim();
    let data = await fetchJSON('/api/login', { method: 'POST', body: JSON.stringify({ login, password: pass }) });
    if (data.success) {
      currentUser = data.user;
      if (socket) socket.disconnect();
      socket = io();
      socket.emit('user_online', currentUser.id);
      socket.on('chat_message', (msg) => addChatMessage(msg.user, msg.text, msg.time));
      socket.on('online_list', (list) => updateOnlineList(list));
      socket.on('lottery_result', (data) => alert(`🎉 ЛОТЕРЕЯ! ${data.winner} выиграл ${data.amount} монет!`));
      await loadUserData();
      renderUI();
    } else alert("Неверный логин!\nАдмин: Fortuna / 805");
  }

  async function doRegister() {
    let login = document.getElementById("regLogin").value.trim();
    let pass = document.getElementById("regPass").value.trim();
    let nick = document.getElementById("regNick").value.trim();
    if (!login || !pass || !nick) { alert("Заполните всё!"); return; }
    let data = await fetchJSON('/api/register', { method: 'POST', body: JSON.stringify({ login, password: pass, nickname: nick }) });
    alert(data.success ? "Регистрация успешна!" : data.message);
  }

  async function doClick() {
    let data = await fetchJSON('/api/click', { method: 'POST', body: JSON.stringify({ userId: currentUser.id }) });
    if (data.success) {
      currentUser.balance = data.balance;
      renderUI();
      if (data.newAchievements?.length) alert(`🏆 Достижение: ${data.newAchievements[0].name} +${data.newAchievements[0].reward} монет!`);
    }
  }

  async function upgradeClick() {
    let data = await fetchJSON('/api/upgrade-click', { method: 'POST', body: JSON.stringify({ userId: currentUser.id }) });
    if (data.success) {
      currentUser.clickPower = data.newPower;
      currentUser.clickUpgradeCost = data.newCost;
      renderUI();
      alert(`✅ Клик улучшен! +${data.newPower.toFixed(2)} монет`);
    } else alert(data.message);
  }

  async function dailyReward() {
    let data = await fetchJSON('/api/daily', { method: 'POST', body: JSON.stringify({ userId: currentUser.id }) });
    if (data.success) {
      await loadUserData();
      renderUI();
      alert(`✅ Ежедневная награда! +${data.reward} монет (стрик ${data.streak}/7)`);
    } else alert(data.message);
  }

  async function spinWheel() {
    let data = await fetchJSON('/api/wheel', { method: 'POST', body: JSON.stringify({ userId: currentUser.id }) });
    if (data.success) {
      await loadUserData();
      renderUI();
      alert(`🎡 Колесо! Выиграно: ${data.reward}`);
    } else alert(data.message);
  }

  async function buyBusiness(id) {
    let data = await fetchJSON('/api/buy-business', { method: 'POST', body: JSON.stringify({ userId: currentUser.id, businessId: id }) });
    if (data.success) { await loadUserData(); renderUI(); alert("✅ Бизнес куплен!"); }
    else alert(data.message);
  }

  async function upgradeBusiness(id) {
    let data = await fetchJSON('/api/upgrade-business', { method: 'POST', body: JSON.stringify({ userId: currentUser.id, businessId: id }) });
    if (data.success) { await loadUserData(); renderUI(); alert(`✅ Улучшен до ${data.newLevel} уровня!`); }
    else alert(data.message);
  }

  async function purchaseLimited(id) {
    let data = await fetchJSON('/api/purchase-limited', { method: 'POST', body: JSON.stringify({ userId: currentUser.id, itemId: id }) });
    if (data.success) { await loadUserData(); renderUI(); alert(`✅ Куплено! Осталось ${data.remaining}`); }
    else alert("Ошибка или предмет закончился");
  }

  async function buyAvatar(id, price) {
    if (!confirm(`Купить аватар за ${price} монет?`)) return;
    let data = await fetchJSON('/api/buy-avatar', { method: 'POST', body: JSON.stringify({ userId: currentUser.id, avatarId: id }) });
    if (data.success) { await loadUserData(); renderUI(); alert("✅ Аватар куплен!"); }
    else alert("Ошибка");
  }

  async function buyFrame(id, price) {
    if (!confirm(`Купить рамку за ${price} монет?`)) return;
    let data = await fetchJSON('/api/buy-frame', { method: 'POST', body: JSON.stringify({ userId: currentUser.id, frameId: id }) });
    if (data.success) { await loadUserData(); renderUI(); alert("✅ Рамка куплена!"); }
    else alert("Ошибка");
  }

  async function depositBank() {
    let amount = prompt("Сколько монет положить в банк? (минимум 1000, на 24ч под 5%)");
    if (!amount) return;
    let data = await fetchJSON('/api/deposit-bank', { method: 'POST', body: JSON.stringify({ userId: currentUser.id, amount: parseInt(amount) }) });
    if (data.success) { await loadUserData(); renderUI(); alert(`✅ Депозит ${data.amount} монет принят!`); }
    else alert(data.message || "Ошибка");
  }

  async function gift() {
    let toId = prompt("ID получателя:");
    let amount = prompt("Сумма:");
    let type = confirm("Крипта? (OK=Крипта, Отмена=Монеты)") ? "crypto" : "coins";
    let data = await fetchJSON('/api/gift', { method: 'POST', body: JSON.stringify({ fromId: currentUser.id, toId, amount: parseInt(amount), type }) });
    if (data.success) { await loadUserData(); renderUI(); alert("✅ Подарок отправлен!"); }
    else alert("Ошибка");
  }

  async function prestige() {
    if (!confirm("Перерождение сбросит бизнесы, уровень и даст +10% к доходу навсегда. Продолжить?")) return;
    let data = await fetchJSON('/api/prestige', { method: 'POST', body: JSON.stringify({ userId: currentUser.id }) });
    if (data.success) { await loadUserData(); renderUI(); alert(`✅ Престиж ${data.newPrestige}! Бонус дохода +${data.bonus}%`); }
    else alert(data.message);
  }

  async function showTop() {
    let data = await fetchJSON('/api/top-players');
    alert(`🏆 ТОП УРОВНЯ:\n${data.byLevel.map(u=>`${u.nickname}: ${u.level}`).join('\n')}\n\n💰 ТОП МОНЕТ:\n${data.byBalance.map(u=>`${u.nickname}: ${Math.floor(u.balance)}`).join('\n')}`);
  }

  async function showLottery() {
    let data = await fetchJSON('/api/lottery-info');
    alert(`🎰 ЛОТЕРЕЯ 🎰\nДжекпот: ${data.pot} монет\nСледующий розыгрыш через ${Math.floor(data.nextIn/60000)} мин\n\nИстория:\n${data.history.map(h=>`${h.winner}: +${h.amount}`).join('\n')}`);
  }

  function sendChatMessage() {
    let input = document.getElementById("chatInput");
    if (!input.value.trim()) return;
    socket.emit('chat_message', { user: currentUser.nickname, text: input.value, time: new Date().toLocaleTimeString() });
    input.value = "";
  }

  function addChatMessage(user, text, time) {
    let div = document.getElementById("chatMsgs");
    if (div) div.innerHTML += `<div><span style="color:#88aaff">${time}</span> <b>${user}</b>: ${text}</div>`;
    if (div) div.scrollTop = div.scrollHeight;
  }

  function updateOnlineList(list) {
    let div = document.getElementById("onlineList");
    if (div) div.innerHTML = list.map(u => `<div>🟢 ${u}</div>`).join("");
  }

  function logout() { currentUser = null; if(socket) socket.disconnect(); renderUI(); }

  function setTab(tab) {
    activeTab = tab;
    renderUI();
  }

  function renderUI() {
    if (!currentUser) {
      document.getElementById("app").innerHTML = `
        <div class="glass" style="max-width:450px;margin:100px auto;text-align:center">
          <h2 class="neon-text">⚡ FORTUNA GAME ⚡</h2>
          <h3>Вход</h3>
          <input id="loginName" placeholder="Логин" style="width:100%"><br>
          <input id="loginPass" type="password" placeholder="Пароль" style="width:100%"><br>
          <button onclick="doLogin()">Войти</button>
          <hr>
          <h3>Регистрация</h3>
          <input id="regLogin" placeholder="Логин" style="width:100%"><br>
          <input id="regPass" type="password" placeholder="Пароль" style="width:100%"><br>
          <input id="regNick" placeholder="Никнейм" style="width:100%"><br>
          <button onclick="doRegister()">Зарегистрироваться</button>
          <p>Админ: Fortuna / 805</p>
        </div>`;
      return;
    }

    let isAdmin = currentUser.role === "admin";
    let businessesList = ['kiosk','car_wash','barbershop','it_company','night_club','crypto_farm','taxi_park','tech_factory','media_hub','oil_rig','space_port','bank'];
    let businessNames = { kiosk:'🥨 Киоск', car_wash:'🚗 Мойка', barbershop:'✂️ Барбер', it_company:'💻 IT', night_club:'🎭 Клуб', crypto_farm:'⛏️ Крипто', taxi_park:'🚕 Такси', tech_factory:'🏭 Завод', media_hub:'📺 Медиа', oil_rig:'🛢️ Нефть', space_port:'🚀 Космос', bank:'🏦 Банк' };
    let businessesIncome = { kiosk:15, car_wash:40, barbershop:60, it_company:120, night_club:200, crypto_farm:350, taxi_park:180, tech_factory:600, media_hub:1000, oil_rig:1600, space_port:2500, bank:4000 };
    
    document.getElementById("app").innerHTML = `
      <div style="max-width:1400px;margin:0 auto">
        <div class="glass" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap">
          <h1 class="neon-text">⚡ FORTUNA GAME ⚡</h1>
          <div>${currentUser.frame || ''} ${currentUser.avatar || '😀'} ${currentUser.nickname} (lvl ${currentUser.level}) | 🪙 ${Math.floor(currentUser.balance)} | 💎 ${currentUser.crypto}<br>
          <small>💰 1 FCR = ${cryptoRate} ${currentUser.prestigeBonus>0 ? `| Престиж +${currentUser.prestigeBonus}%` : ''}</small> <button onclick="logout()">Выйти</button></div>
        </div>
        
        <div style="text-align:center; margin-bottom:20px">
          <span class="tab ${activeTab==='main'?'active':''}" onclick="setTab('main')">🏠 Главная</span>
          <span class="tab ${activeTab==='business'?'active':''}" onclick="setTab('business')">💼 Бизнесы</span>
          <span class="tab ${activeTab==='shop'?'active':''}" onclick="setTab('shop')">🏪 Магазин</span>
          <span class="tab ${activeTab==='profile'?'active':''}" onclick="setTab('profile')">👤 Профиль</span>
          <span class="tab ${activeTab==='top'?'active':''}" onclick="setTab('top')">🏆 Топ</span>
        </div>
        
        <div id="tab-main" class="tab-content ${activeTab==='main'?'active':''}">
          <div class="grid-panel">
            <div class="glass-card" style="text-align:center">
              <h3>🖱️ КЛИКЕР</h3>
              <button class="click-button" onclick="doClick()">💰 КЛИК! (+${currentUser.clickPower.toFixed(2)})</button>
              <button onclick="upgradeClick()">⬆️ Улучшить (${currentUser.clickUpgradeCost})</button>
              <p>Всего кликов: ${currentUser.totalClicks || 0}</p>
            </div>
            <div class="glass-card">
              <h3>📋 Задания</h3>
              <button onclick="dailyReward()">🎁 Ежедневная награда</button>
              <button onclick="spinWheel()">🎡 Колесо Фортуны</button>
              <button onclick="showLottery()">🎰 Лотерея</button>
              <p>XP: ${currentUser.xp}/${currentUser.level*100}</p>
            </div>
            <div class="glass-card">
              <h3>🏦 Банк</h3>
              ${currentUser.bankDeposit > 0 ? `<p>Депозит: ${currentUser.bankDeposit} монет (${currentUser.bankRate}% через ${Math.max(0,Math.ceil((currentUser.bankDepositTime-Date.now())/3600000))}ч)</p>` : `<button onclick="depositBank()">💰 Положить в банк (+5% за 24ч)</button>`}
              <button onclick="gift()">🎁 Подарок другу</button>
              ${currentUser.level >= 100 ? `<button onclick="prestige()">🌟 ПРЕСТИЖ (100 лвл → +10%)</button>` : `<small>Престиж доступен на 100 уровне</small>`}
            </div>
          </div>
          <div class="glass-card">
            <h3>💬 Чат</h3>
            <div id="chatMsgs" class="chat-messages"></div>
            <input id="chatInput" placeholder="Сообщение" style="width:70%"><button onclick="sendChatMessage()">Отправить</button>
            <div id="onlineList" style="margin-top:10px"></div>
          </div>
        </div>
        
        <div id="tab-business" class="tab-content ${activeTab==='business'?'active':''}">
          <div class="glass-card">
            <h3>💼 Бизнесы</h3>
            <div id="businessList"></div>
          </div>
        </div>
        
        <div id="tab-shop" class="tab-content ${activeTab==='shop'?'active':''}">
          <div class="grid-panel">
            <div class="glass-card">
              <h3>🎯 ЛИМИТИРОВАННЫЕ</h3>
              <div id="limitedList"></div>
            </div>
            <div class="glass-card">
              <h3>🎨 АВАТАРКИ</h3>
              <div id="avatarList"></div>
            </div>
            <div class="glass-card">
              <h3>🖼️ РАМКИ</h3>
              <div id="frameList"></div>
            </div>
          </div>
        </div>
        
        <div id="tab-profile" class="tab-content ${activeTab==='profile'?'active':''}">
          <div class="grid-panel">
            <div class="glass-card">
              <h3>📊 Статистика</h3>
              <p>🏆 Уровень: ${currentUser.level}</p>
              <p>⭐ Престиж: ${currentUser.prestige || 0} (+${currentUser.prestigeBonus || 0}% дохода)</p>
              <p>🖱️ Кликов: ${currentUser.totalClicks || 0}</p>
              <p>💼 Бизнесов: ${currentUser.businesses?.length || 0}</p>
              <p>🏆 Достижений: ${currentUser.achievements?.length || 0}/5</p>
              <p>🎁 Подарков отправлено: ${currentUser.stats?.giftsSent || 0}</p>
            </div>
            <div class="glass-card">
              <h3>🏆 Достижения</h3>
              <div id="achievementsList"></div>
            </div>
          </div>
        </div>
        
        <div id="tab-top" class="tab-content ${activeTab==='top'?'active':''}">
          <div class="glass-card">
            <h3>🏆 ТОП-10 ИГРОКОВ</h3>
            <button onclick="showTop()">📊 Показать топ</button>
          </div>
        </div>
        
        ${isAdmin ? `<div class="glass-card admin-only"><h3>🛠 АДМИН ПАНЕЛЬ</h3><p>ID: ${currentUser.id} | Роль: Администратор</p><button onclick="alert('Админ функции в разработке')">Управление</button></div>` : ""}
      </div>
    `;
    
    // Бизнесы
    let bizDiv = document.getElementById("businessList");
    if (bizDiv) {
      bizDiv.innerHTML = businessesList.map(id => {
        let owned = currentUser.businesses?.includes(id);
        let level = currentUser.businessLevels?.[id] || 1;
        let cost = {kiosk:300,car_wash:800,barbershop:1500,it_company:3000,night_club:6000,crypto_farm:12000,taxi_park:5000,tech_factory:28000,media_hub:50000,oil_rig:90000,space_port:180000,bank:400000}[id];
        return `<div style="margin:10px 0;padding:10px;background:#00002233;border-radius:15px">
          ${businessNames[id]} | Ур.${level} | Доход: ${(businessesIncome[id]||0)*level}/мин<br>
          ${!owned ? `<button onclick="buyBusiness('${id}')">Купить (${cost})</button>` : `<button onclick="upgradeBusiness('${id}')">Апгрейд (${Math.floor(cost*level*0.4)})</button>`}
        </div>`;
      }).join('');
    }
    
    // Лимитки
    fetch('/api/limited-stats').then(r=>r.json()).then(data => {
      let div = document.getElementById("limitedList");
      if(div) div.innerHTML = Object.entries(data).map(([id,item])=>`<div style="margin:5px 0">${item.name} (${item.sold}/${item.total}) <button onclick="purchaseLimited('${id}')">Купить за ${item.price} ${item.currency==='coins'?'монет':'крипты'}</button></div>`).join('');
    });
    
    // Аватарки и рамки
    fetch('/api/avatars').then(r=>r.json()).then(data => {
      let avatarDiv = document.getElementById("avatarList");
      if(avatarDiv) avatarDiv.innerHTML = data.avatars.map(a=>`<div style="margin:5px 0">${a.name} (${a.price} монет) <button onclick="buyAvatar('${a.id}',${a.price})">Выбрать</button></div>`).join('');
      let frameDiv = document.getElementById("frameList");
      if(frameDiv) frameDiv.innerHTML = data.frames.map(f=>`<div style="margin:5px 0">${f.name} (${f.price} монет) <button onclick="buyFrame('${f.id}',${f.price})">Выбрать</button></div>`).join('');
    });
    
    // Достижения
    let achievements = [
      { id: "click_100", name: "Кликер", reward: 1000 },
      { id: "click_1000", name: "Профи", reward: 5000 },
      { id: "balance_100k", name: "Миллионер", reward: 10000 },
      { id: "business_5", name: "Бизнесмен", reward: 5000 },
      { id: "level_10", name: "Новичок", reward: 2000 }
    ];
    let achDiv = document.getElementById("achievementsList");
    if(achDiv) achDiv.innerHTML = achievements.map(a=>`<div style="margin:5px 0">${a.name} ${currentUser.achievements?.includes(a.id)?'✅':'❌'} (+${a.reward} монет)</div>`).join('');
  }
  
  renderUI();
  setInterval(async () => { if(currentUser) { await loadUserData(); renderUI(); } }, 60000);
  setInterval(async () => { let r=await fetch('/api/crypto-rate'); let d=await r.json(); cryptoRate=d.rate; renderUI(); }, 30000);
</script>
</body>
  </html>
