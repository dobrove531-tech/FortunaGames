<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Fortuna Game | Бизнес-симулятор</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', 'Orbitron', monospace; }
    body { background: radial-gradient(circle at 20% 30%, #0a0a1a, #020210); min-height: 100vh; color: #e0e0ff; padding: 20px; }
    .glass { background: rgba(20, 20, 45, 0.65); backdrop-filter: blur(12px); border-radius: 28px; border: 1px solid rgba(100, 100, 255, 0.4); padding: 18px; margin-bottom: 20px; }
    .glass-card { background: rgba(20, 20, 45, 0.65); backdrop-filter: blur(12px); border-radius: 28px; border: 1px solid rgba(100, 100, 255, 0.4); padding: 18px; }
    .neon-text { text-shadow: 0 0 5px #4466ff; color: #88aaff; }
    button { background: linear-gradient(135deg, #1a1a3a, #0a0a2a); border: 1px solid #6688ff; color: #bbddff; padding: 8px 18px; border-radius: 40px; font-weight: bold; cursor: pointer; transition: 0.2s; }
    button:hover { background: linear-gradient(135deg, #2a2a5a, #1a1a4a); transform: scale(1.02); border-color: #ff88cc; }
    input, select { background: #111122; border: 1px solid #4466cc; padding: 8px 12px; border-radius: 20px; color: white; }
    .grid-panel { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 24px; margin-bottom: 30px; }
    .chat-messages { height: 200px; overflow-y: auto; background: #000022aa; border-radius: 20px; padding: 10px; }
    .market-item { border-bottom: 1px solid #6688ff; padding: 8px; display: flex; justify-content: space-between; }
    .admin-only { border: 2px solid #ff88cc; background: #1a0a2a; }
    .limited { color: #ffaa88; border: 1px solid #ff8866; background: #331100; display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 12px; }
    .wheel { width: 200px; height: 200px; border-radius: 50%; background: conic-gradient(#ff4444 0deg 36deg, #ffaa44 36deg 72deg, #ffff44 72deg 108deg, #44ff44 108deg 144deg, #44ffff 144deg 180deg, #4444ff 180deg 216deg, #aa44ff 216deg 252deg, #ff44ff 252deg 288deg, #ff4444 288deg 324deg, #ffaa44 324deg 360deg); margin: 10px auto; transition: transform 3s ease-out; cursor: pointer; }
    .crypto-up { color: #44ff44; }
    .crypto-down { color: #ff4444; }
    .inventory-modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1a1a2a; border: 2px solid #6688ff; border-radius: 20px; padding: 20px; z-index: 1000; max-width: 90%; max-height: 80%; overflow: auto; }
    .overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 999; }
  </style>
</head>
<body>
<div id="app"></div>

<script>
  let currentUser = null;
  let socket = null;
  let cryptoRate = 100;
  let chatSendTimeout = false;
  
  // 12 бизнесов
  const businesses = {
    kiosk: { name: "🥨 Киоск еды", baseIncome: 15, cost: 300, requiredLevel: 1, givesCrypto: false },
    car_wash: { name: "🚗 Автомойка", baseIncome: 40, cost: 800, requiredLevel: 2, givesCrypto: false },
    barbershop: { name: "✂️ Барбершоп", baseIncome: 60, cost: 1500, requiredLevel: 3, givesCrypto: false },
    it_company: { name: "💻 IT компания", baseIncome: 120, cost: 3000, requiredLevel: 4, givesCrypto: false },
    night_club: { name: "🎭 Ночной клуб", baseIncome: 200, cost: 6000, requiredLevel: 5, givesCrypto: false },
    crypto_farm: { name: "⛏️ Крипто-ферма", baseIncome: 350, cost: 12000, requiredLevel: 6, givesCrypto: true },
    taxi_park: { name: "🚕 Таксопарк", baseIncome: 180, cost: 5000, requiredLevel: 5, givesCrypto: false },
    tech_factory: { name: "🏭 Завод технологий", baseIncome: 600, cost: 28000, requiredLevel: 8, givesCrypto: false },
    media_hub: { name: "📺 Медиа холдинг", baseIncome: 1000, cost: 50000, requiredLevel: 10, givesCrypto: false },
    oil_rig: { name: "🛢️ Нефтяная вышка", baseIncome: 1600, cost: 90000, requiredLevel: 12, givesCrypto: false },
    space_port: { name: "🚀 Космопорт", baseIncome: 2500, cost: 180000, requiredLevel: 15, givesCrypto: true },
    bank: { name: "🏦 Банк", baseIncome: 4000, cost: 400000, requiredLevel: 20, givesCrypto: false }
  };
  
  async function loadUserData() {
    if (!currentUser) return;
    const res = await fetch(`/api/user/${currentUser.id}`);
    const data = await res.json();
    currentUser = data;
    return data;
  }
  
  async function updateCryptoRate() {
    const res = await fetch('/api/crypto-rate');
    const data = await res.json();
    cryptoRate = data.rate;
    renderUI();
  }
  
  async function doLogin() {
    const login = document.getElementById("loginName").value.trim();
    const pass = document.getElementById("loginPass").value.trim();
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ login, password: pass })
    });
    const data = await res.json();
    if (data.success) {
      currentUser = data.user;
      if (socket) socket.disconnect();
      socket = io();
      socket.emit('user_online', currentUser.id);
      socket.on('chat_message', (msg) => addChatMessage(msg.user, msg.text, msg.time));
      socket.on('online_list', (list) => updateOnlineList(list));
      await loadUserData();
      renderUI();
    } else {
      alert("Неверный логин или пароль!\n\nАдмин: Fortuna / 805");
    }
  }
  
  async function doRegister() {
    const login = document.getElementById("regLogin").value.trim();
    const pass = document.getElementById("regPass").value.trim();
    const nick = document.getElementById("regNick").value.trim();
    if (!login || !pass || !nick) { alert("Заполните все поля!"); return; }
    const res = await fetch('/api/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ login, password: pass, nickname: nick })
    });
    const data = await res.json();
    if (data.success) alert("Регистрация успешна! Теперь войдите.");
    else alert(data.message);
  }
  
  async function spinWheel() {
    const res = await fetch('/api/wheel', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ userId: currentUser.id })
    });
    const data = await res.json();
    if (data.success) {
      alert(`🎡 Колесо Фортуны!\nВы выиграли: ${data.reward}`);
      await loadUserData();
      renderUI();
    } else {
      alert(data.message);
    }
  }
  
  async function completeDaily() {
    const res = await fetch('/api/daily', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ userId: currentUser.id })
    });
    const data = await res.json();
    if (data.success) {
      alert("✅ +50 XP и 200 монет!");
      await loadUserData();
      renderUI();
    } else {
      alert("Уже выполнено сегодня!");
    }
  }
  
  async function buyBusiness(bizId) {
    const res = await fetch('/api/buy-business', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ userId: currentUser.id, businessId: bizId })
    });
    const data = await res.json();
    if (data.success) {
      alert(`✅ Куплен ${businesses[bizId].name}!`);
      await loadUserData();
      renderUI();
    } else {
      alert(data.message);
    }
  }
  
  async function upgradeBusiness(bizId) {
    const res = await fetch('/api/upgrade-business', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ userId: currentUser.id, businessId: bizId })
    });
    const data = await res.json();
    if (data.success) {
      alert(`✅ Бизнес улучшен до ${data.level} уровня!`);
      await loadUserData();
      renderUI();
    } else {
      alert(data.message);
    }
  }
  
  async function purchaseLimited(itemId) {
    const res = await fetch('/api/purchase-limited', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ userId: currentUser.id, itemId: itemId })
    });
    const data = await res.json();
    if (data.success) {
      alert(`✅ Куплен ${data.itemName}! Осталось ${data.remaining}/${data.total}`);
      await loadUserData();
      renderUI();
    } else {
      alert(data.message);
    }
  }
  
  async function adminGiveLevel(userId, level) {
    const res = await fetch('/api/admin/set-level', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ adminId: currentUser.id, userId: userId, level: level })
    });
    const data = await res.json();
    alert(data.message);
    if (data.success) await loadUserData();
  }
  
  function showInventory() {
    const items = currentUser.inventory || [];
    if (items.length === 0) {
      alert("📦 Инвентарь пуст!");
      return;
    }
    alert("📦 Ваш инвентарь:\n" + items.map(i => `- ${i.name}`).join("\n"));
  }
  
  function sendChatMessage() {
    if (chatSendTimeout) {
      alert("Не спамьте! Подождите секунду.");
      return;
    }
    const input = document.getElementById("chatInput");
    if (!input || !input.value.trim() || !currentUser) return;
    const msg = { user: currentUser.nickname, text: input.value.trim(), time: new Date().toLocaleTimeString() };
    socket.emit('chat_message', msg);
    input.value = "";
    chatSendTimeout = true;
    setTimeout(() => { chatSendTimeout = false; }, 1000);
  }
  
  function addChatMessage(user, text, time) {
    const chatDiv = document.getElementById("chatMsgs");
    if (chatDiv) chatDiv.innerHTML += `<div><span style="color:#88aaff">${time}</span> <b>${user}</b>: ${text}</div>`;
    if (chatDiv) chatDiv.scrollTop = chatDiv.scrollHeight;
  }
  
  function updateOnlineList(users) {
    const listDiv = document.getElementById("onlineList");
    if (listDiv) listDiv.innerHTML = users.map(u => `<div>🟢 ${u}</div>`).join("");
  }
  
  function logout() {
    currentUser = null;
    if (socket) socket.disconnect();
    renderUI();
  }
  
  async function loadLimitedStats() {
    const res = await fetch('/api/limited-stats');
    const data = await res.json();
    return data;
  }
  
  function renderUI() {
    if (!currentUser) {
      document.getElementById("app").innerHTML = renderLoginRegister();
      return;
    }
    
    const isAdmin = currentUser.role === "admin";
    const wheelAvailable = !currentUser.lastWheel || (Date.now() - currentUser.lastWheel) >= 86400000;
    const hasVip = currentUser.inventory?.some(i => i.id === "vip_kazakh") || false;
    
    document.getElementById("app").innerHTML = `
      <div style="max-width:1400px;margin:0 auto">
        <div class="glass" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap">
          <h1 class="neon-text">⚡ FORTUNA GAME ⚡</h1>
          <div>👤 ${currentUser.nickname} (lvl ${currentUser.level}) | 🪙 ${Math.floor(currentUser.balance)} FC | 💎 ${currentUser.crypto} FCR<br><small>💰 1 FCR = ${cryptoRate} FC ${hasVip ? '| 👑 VIPKazakh +20%' : ''}</small> <button onclick="logout()">Выйти</button></div>
        </div>
        
        <div class="grid-panel">
          <div class="glass-card">
            <h3>📋 Задания</h3>
            <button onclick="completeDaily()">✅ Ежедневное (+50 XP, 200 монет)</button>
            <p>XP: ${currentUser.xp || 0}/${currentUser.level * 100}</p>
            <button onclick="showInventory()">📦 Инвентарь (${currentUser.inventory?.length || 0})</button>
          </div>
          
          <div class="glass-card">
            <h3>🏪 Магазин</h3>
            <div>👑 VIPKazakh (75000 монет, +20% дохода) <span class="limited" id="vipKazakhCount">Загрузка...</span> <button onclick="purchaseLimited('vip_kazakh')">Купить</button></div>
            <div>👑 Корона фортуны (50000) <span class="limited" id="crownCount">Загрузка...</span> <button onclick="purchaseLimited('crown')">Купить</button></div>
            <div>🐉 Драконий меч (25000) <span class="limited" id="dragonCount">Загрузка...</span> <button onclick="purchaseLimited('dragon_sword')">Купить</button></div>
            <div>💎 Крипто-карта (500 FCR) <span class="limited" id="cryptoCardCount">Загрузка...</span> <button onclick="purchaseLimited('crypto_card')">Купить</button></div>
          </div>
          
          <div class="glass-card" style="text-align:center">
            <h3>🎡 Колесо Фортуны</h3>
            <div class="wheel" onclick="spinWheel()"></div>
            <p>${wheelAvailable ? "✅ Доступно!" : "⏰ Уже крутили сегодня"}</p>
          </div>
        </div>
        
        <div class="grid-panel">
          <div class="glass-card">
            <h3>💼 Бизнесы (12 шт)</h3>
            <div id="businessList" style="max-height:400px;overflow-y:auto"></div>
          </div>
          
          <div class="glass-card">
            <h3>💬 Чат</h3>
            <div id="chatMsgs" class="chat-messages"></div>
            <input id="chatInput" placeholder="Сообщение" style="width:70%">
            <button onclick="sendChatMessage()">Отправить</button>
          </div>
          
          <div class="glass-card">
            <h3>🟢 Онлайн</h3>
            <div id="onlineList"></div>
          </div>
        </div>
        
        ${isAdmin ? `
        <div class="glass-card admin-only">
          <h3>🛠 АДМИН ПАНЕЛЬ</h3>
          <input id="adminUserId" placeholder="ID пользователя" style="width:100px">
          <input id="adminLevel" placeholder="Уровень" style="width:100px">
          <button onclick="adminGiveLevel(document.getElementById('adminUserId').value, document.getElementById('adminLevel').value)">📈 Выдать уровень</button>
        </div>
        ` : ""}
      </div>
    `;
    
    // Загрузка актуальных данных лимиток
    fetch('/api/limited-stats').then(res => res.json()).then(data => {
      const vipSpan = document.getElementById("vipKazakhCount");
      const crownSpan = document.getElementById("crownCount");
      const dragonSpan = document.getElementById("dragonCount");
      const cryptoCardSpan = document.getElementById("cryptoCardCount");
      if (vipSpan) vipSpan.innerText = `${data.vip_kazakh?.sold || 0}/${data.vip_kazakh?.total || 3}`;
      if (crownSpan) crownSpan.innerText = `${data.crown?.sold || 0}/${data.crown?.total || 10}`;
      if (dragonSpan) dragonSpan.innerText = `${data.dragon_sword?.sold || 0}/${data.dragon_sword?.total || 15}`;
      if (cryptoCardSpan) cryptoCardSpan.innerText = `${data.crypto_card?.sold || 0}/${data.crypto_card?.total || 20}`;
    });
    
    // Бизнесы
    const bizDiv = document.getElementById("businessList");
    if (bizDiv) {
      let html = "";
      for (let [id, biz] of Object.entries(businesses)) {
        const owned = currentUser.businesses?.includes(id);
        const level = currentUser.businessLevels?.[id] || 1;
        const income = biz.baseIncome * level;
        html += `
          <div style="margin:10px 0;padding:10px;background:#00002233;border-radius:15px">
            ${biz.name} | Ур.${level} | Доход: ${income}/мин<br>
            Треб. уровень: ${biz.requiredLevel} | Цена: ${biz.cost}<br>
            ${!owned ? `<button onclick="buyBusiness('${id}')">Купить</button>` : `<button onclick="upgradeBusiness('${id}')">Апгрейд (${Math.floor(biz.cost * level * 0.5)})</button>`}
          </div>
        `;
      }
      bizDiv.innerHTML = html;
    }
  }
  
  function renderLoginRegister() {
    return `
      <div class="glass" style="max-width:450px;margin:100px auto;text-align:center">
        <h2 class="neon-text">⚡ FORTUNA GAME ⚡</h2>
        <h3>Вход</h3>
        <input id="loginName" placeholder="Логин" style="width:100%;margin:5px 0">
        <input id="loginPass" type="password" placeholder="Пароль" style="width:100%;margin:5px 0">
        <button onclick="doLogin()">Войти</button>
        <hr>
        <h3>Регистрация</h3>
        <input id="regLogin" placeholder="Логин" style="width:100%;margin:5px 0">
        <input id="regPass" type="password" placeholder="Пароль" style="width:100%;margin:5px 0">
        <input id="regNick" placeholder="Никнейм" style="width:100%;margin:5px 0">
        <button onclick="doRegister()">Зарегистрироваться</button>
        <p style="margin-top:15px">Админ: Fortuna / 805</p>
      </div>
    `;
  }
  
  renderUI();
  setInterval(updateCryptoRate, 30000);
</script>
</body>
  </html>
